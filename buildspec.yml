version: 0.2

env:
  variables:
    EKS_CLUSTER_NAME: my-k8s-cluster
    AWS_DEFAULT_REGION: us-east-1
    ECR_REPOSITORY_URI: 694862618269.dkr.ecr.us-east-1.amazonaws.com/my-flask-app-repo

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing dependencies..."
      - apt-get update -y
      - apt-get install -y ca-certificates curl
      - update-ca-certificates
      - python -m pip install --upgrade pip
      - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  pre_build:
    commands:
      - chmod +x pre_build.sh
      - ./pre_build.sh

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "$REPOSITORY_URI:latest" -t "$REPOSITORY_URI:$IMAGE_TAG" ./docker-compose-app
      - docker push "$REPOSITORY_URI:latest"
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - echo "Packaging Helm chart..."
      - cd my-flask-chart
      - sed -i "s|tag: latest|tag: ${IMAGE_TAG}|" values.yaml
      - helm package .
      - mkdir -p ../artifacts
      - mv *.tgz ../artifacts/my-flask-app.tgz
      - cd ..

  post_build:
    commands:
      - echo "Build completed successfully!"

artifacts:
  files:
    - artifacts/my-flask-app.tgz
  discard-paths: yes
