version: 0.2

env:
  variables:
    EKS_CLUSTER_NAME: "my-k8s-cluster"
    AWS_DEFAULT_REGION: "us-east-1"
    ECR_REPOSITORY_URI: "694862618269.dkr.ecr.us-east-1.amazonaws.com/my-flask-app-repo"
    IMAGE_TAG: "latest"

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Updating CA certificates..."
      - apt-get update -y
      - apt-get install -y ca-certificates curl
      - update-ca-certificates
      - python -m pip install --upgrade pip
      - echo "Installing Helm..."
      - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REPOSITORY_URI"
      - export REPOSITORY_URI="$ECR_REPOSITORY_URI"
      - echo "Using IMAGE_TAG=$IMAGE_TAG"
      - echo "EKS_CLUSTER_NAME=$EKS_CLUSTER_NAME"
      - echo "AWS_DEFAULT_REGION=$AWS_DEFAULT_REGION"
      - aws eks list-clusters --region "$AWS_DEFAULT_REGION"
      - aws sts get-caller-identity
      - echo "Configuring kubeconfig..."
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "$REPOSITORY_URI:$IMAGE_TAG" ./docker-compose-app
      - docker push "$REPOSITORY_URI:$IMAGE_TAG"
      - echo "Deploying Helm chart directly from directory..."
      - helm upgrade my-flask-app-release my-flask-chart \
          --install --atomic --wait --timeout 5m \
          --namespace default \
          --set image.repository="$ECR_REPOSITORY_URI" \
          --set image.tag="$IMAGE_TAG"
      - echo "Helm deployment complete!"

  post_build:
    commands:
      - echo "Build completed successfully!"
      - ls -R BuildOutput

artifacts:
  files:
    - BuildOutput/my-flask-app.tgz
  discard-paths: yes
