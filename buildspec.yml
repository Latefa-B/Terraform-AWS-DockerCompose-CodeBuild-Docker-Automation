version: 0.2

env:
  variables:
    EKS_CLUSTER_NAME: "my-k8s-cluster"
    AWS_DEFAULT_REGION: "us-east-1"
    ECR_REPOSITORY_URI: "694862618269.dkr.ecr.us-east-1.amazonaws.com/my-flask-app-repo"
    IMAGE_TAG: "latest"

phases:
  install:
    runtime-versions:
      python: 3.9
    commands:
      - echo "Installing dependencies..."
      - apt-get update -y
      - apt-get install -y curl
      - echo "Installing Helm..."
      - curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

  pre_build:
    commands:
      - echo "Logging into ECR..."
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REPOSITORY_URI"
      - echo "Configuring kubeconfig..."
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_DEFAULT_REGION"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t "$ECR_REPOSITORY_URI:$IMAGE_TAG" ./docker-compose-app
      - docker push "$ECR_REPOSITORY_URI:$IMAGE_TAG"

      - echo "Deploying Helm chart from local directory..."
      - cd my-flask-chart
      - helm upgrade my-flask-app-release . \
          --install --atomic --wait --timeout 5m \
          --namespace default \
          --set image.repository="$ECR_REPOSITORY_URI" \
          --set image.tag="$IMAGE_TAG" \
          --debug
      - echo "Deployment finished successfully!"

post_build:
  commands:
    - echo "Build stage complete. No artifacts to upload."

artifacts:
  files:
    - '**/*'
  discard-paths: yes
